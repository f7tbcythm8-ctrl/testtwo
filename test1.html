<!DOCTYPE html>
<html lang="zh-CN">
<head>
   <meta charset="UTF-8">
    <title>闪电快递</title>
    <!-- 引入Animate.css动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        /* 基础重置 */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        /* 页面整体样式 */
        body { 
            font-family: 'Microsoft YaHei', Arial, sans-serif; 
            background: #0a192f;  /* 深蓝色背景 */
            color: #e6f1ff;       /* 浅蓝色文字 */
            line-height: 1.6;     /* 行高 */
        }

        .header {
    background: rgba(10, 25, 47, 0.9);  /* 半透明深色背景 */
    backdrop-filter: blur(10px);        /* 毛玻璃效果 */
    padding: 1.5rem 2rem;               /* 内边距 */
    position: fixed;                    /* 固定定位 */
    width: 100%;                        /* 全宽 */
    z-index: 1000;                      /* 确保在最上层 */
    border-bottom: 1px solid rgba(100, 255, 218, 0.1); /* 底部边框 */
}

.nav {
    max-width: 1200px;                  /* 最大宽度 */
    margin: 0 auto;                     /* 居中 */
    display: flex;                      /* 弹性布局 */
    justify-content: space-between;     /* 两端对齐 */
    align-items: center;                /* 垂直居中 */
}

.logo {
    font-size: 1.8rem;                  /* 字体大小 */
    font-weight: bold;                  /* 加粗 */
    color: #64ffda;                     /* 亮绿色 */
    letter-spacing: 1px;                /* 字间距 */
}

.nav-links a {
    color: #ccd6f6;                     /* 链接颜色 */
    text-decoration: none;              /* 去掉下划线 */
    margin-left: 2rem;                  /* 左边距 */
    font-size: 1.1rem;                  /* 字体大小 */
}

.nav-links a:hover {
    color: #64ffda;                     /* 悬停颜色 */
}



/* 主内容区域 */
.main {
    padding-top: 6rem;  /* 顶部内边距，为固定导航栏留出空间 */
}

/* 英雄区域 */
.hero {
    text-align: center;                 /* 文字居中 */
    padding: 6rem 2rem;                 /* 内边距 */
    background: linear-gradient(rgba(10, 25, 47, 0.9), rgba(10, 25, 47, 0.7)); /* 渐变背景 */
}

.hero h1 {
    font-size: 3.5rem;                  /* 大标题 */
    margin-bottom: 1.5rem;              /* 下边距 */
    background: linear-gradient(120deg, #64ffda, #00b3ff); /* 渐变文字 */
    -webkit-background-clip: text;      /* 文字裁剪 */
    -webkit-text-fill-color: transparent; /* 透明文字 */
}

.hero p {
    font-size: 1.2rem;                  /* 段落文字大小 */
    color: #8892b0;                     /* 浅灰色文字 */
    max-width: 600px;                   /* 最大宽度 */
    margin: 0 auto 2.5rem;              /* 自动外边距，底部边距 */
}


/* 按钮容器 */
.cta-buttons {
    display: flex;                      /* 弹性布局 */
    gap: 1rem;                          /* 按钮间距 */
    justify-content: center;            /* 居中对齐 */
    flex-wrap: wrap;                    /* 允许换行 */
}

/* 基础按钮样式 */
.btn {
    display: inline-block;              /* 行内块元素 */
    padding: 0.8rem 2rem;               /* 内边距 */
    border-radius: 4px;                 /* 圆角 */
    text-decoration: none;              /* 去掉下划线 */
    font-weight: 500;                   /* 中等粗细 */
    cursor: pointer;                    /* 手型光标 */
    transition: all 0.3s;               /* 过渡效果 */
    border: 1px solid #64ffda;          /* 边框 */
}

/* 主要按钮样式 */
.btn-primary {
    background: #64ffda;                /* 背景色 */
    color: #0a192f;                     /* 文字颜色 */
}

/* 轮廓按钮样式 */
.btn-outline {
    background: transparent;            /* 透明背景 */
    color: #64ffda;                     /* 文字颜色 */
}

/* 按钮悬停效果 */
.btn:hover {
    transform: translateY(-3px);        /* 向上移动 */
    box-shadow: 0 10px 20px rgba(100, 255, 218, 0.2); /* 阴影效果 */
}

    </style>
</head>
<body> 
    <header class="header animate__animated animate__fadeInDown">
    <nav class="nav">
        <div class="logo animate__animated animate__fadeIn">闪电快递</div>
        <div class="nav-links">
            <a href="#home" class="animate__animated animate__fadeIn animate__delay-1s">首页</a>
            <a href="#services" class="animate__animated animate__fadeIn animate__delay-2s">服务</a>
            <a href="#track" class="animate__animated animate__fadeIn animate__delay-3s">追踪</a>
            <a href="#contact" class="animate__animated animate__fadeIn animate__delay-4s">联系</a>
        </div>
    </nav>
</header>


    <main class="main">
    <!-- 英雄区域（主视觉） -->
        <section id="home" class="hero">
            <h1>闪电速递，使命必达</h1>
            <p>城市最快快递服务，30分钟内送达，为您的每一份包裹保驾护航</p>
            <div class="cta-buttons">
                <a href="#track" class="btn btn-primary">追踪包裹</a>
                <a href="#services" class="btn btn-outline">查看服务</a>
            </div>
        </section>
    </main>
</body>
</html>
